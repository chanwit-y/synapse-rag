services:
  app:
    build: .
    image: synapse-rag
    container_name: synapse-rag
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override the in-container DB path here if needed; the named volume
      # below is mounted at /app/.data.
      DATABASE_URL: /app/.data/synapse-rumi.db
    volumes:
      - synapse-data:/app/.data

volumes:
  synapse-data:
